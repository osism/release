---
# Default config for the drift detector.
# Override with `--config PATH` if needed. Reads remote (GitHub) by default;
# pass `--base-dir DIR` (repeatable) to read OSISM repos from local checkouts.

remote:
  github_raw: https://raw.githubusercontent.com/
  github_api: https://api.github.com/repos/
  default_owner: osism
  branch: main

sources:
  kolla: {owner: openstack, branch: stable/2025.2}
  kolla_ansible: {owner: openstack, branch: stable/2025.2}

release_version: latest

plugins:
  release_vs_manager: {enabled: true}
  role_shadows: {enabled: true}
  role_unpinned: {enabled: true}
  rolling_pin: {enabled: true}
  image_orphan: {enabled: true}
  kolla_version_chain_inner: {enabled: true}
  kolla_version_chain_upstream: {enabled: true}
  kolla_inventory: {enabled: true}
  kolla_enablement_build: {enabled: true}
  kolla_enablement_orphan: {enabled: true}
  kolla_groupvars_missing: {enabled: true}
  kolla_mirror_verbatim: {enabled: true}
  kolla_orphan_config: {enabled: true}
  kolla_image_orphan: {enabled: true}
  kolla_secrets_orphan: {enabled: true}
