---
# Maps component names from base.yml to their GitHub source repositories.
#
# Components listed under "components" are OSISM-maintained; for these the
# CHANGELOG.md of the source repository is fetched and the sections between
# two release versions are included in the release notes input generated by
# scripts/generate-release-changelog.sh. Components not listed here are
# treated as third-party dependencies (version bump only).
#
# Components listed under "derived" are not pinned in base.yml themselves;
# their version is read from a requirements file of another component
# (source) at the version pinned in base.yml. Example: the netbox-manager
# version used by a release is defined by requirements.netbox-manager.txt
# of python-osism at the pinned osism version.
#
# Note: this intentionally differs from etc/images.yml, which maps image
# names to container registry paths, not to source repositories.

components:
  ceph_ansible: osism/container-image-ceph-ansible
  defaults: osism/defaults
  generics: osism/generics
  inventory_reconciler: osism/container-image-inventory-reconciler
  # the kolla CHANGELOG.md starts at v0.20251208.0; version ranges before
  # that fall back to a version bump note in the generated input
  kolla: osism/container-images-kolla
  kolla_ansible: osism/container-image-kolla-ansible
  manager_playbooks: osism/ansible-playbooks-manager
  # osism covers both osism_projects.osism and docker_images.osism;
  # identical ranges are deduplicated when fetching changelogs
  osism: osism/python-osism
  osism.commons: osism/ansible-collection-commons
  osism.services: osism/ansible-collection-services
  osism.validations: osism/ansible-collection-validations
  osism_ansible: osism/container-image-osism-ansible
  osism_kubernetes: osism/osism-kubernetes
  playbooks: osism/ansible-playbooks

derived:
  netbox-manager:
    repository: osism/netbox-manager
    source: osism
    file: requirements.netbox-manager.txt
